services:
  aggregator:
    build: ./aggregator
    image: uts-aggregator:latest
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:pass@storage:5432/db
      BROKER_URL: redis://broker:6379/0
      WORKER_COUNT: 6
    ports:
      - "8080:8080"

  publisher:
    build: ./publisher
    image: uts-publisher:latest
    depends_on:
      - aggregator
    environment:
      TARGET_URL: http://aggregator:8080/publish
      TOTAL_EVENTS: 20000
      DUPLICATE_RATE: 0.30
      BATCH_SIZE: 250
    profiles:
      - demo

  broker:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: []
    volumes:
      - broker_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  storage:
    image: postgres:16-alpine
    ports: []
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pg_data:
  broker_data:
